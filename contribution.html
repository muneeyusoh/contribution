<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ระบบสมทบเงินกองทุนสวัสดิการชุมชน</title>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  
  <style>
    :root { --fintech-primary: #0A2540; --fintech-accent: #635BFF; --bg-light: #F7F9FC; }
    body { background-color: var(--bg-light); font-family: 'Prompt', sans-serif; color: #333; }
    .app-header { background: linear-gradient(135deg, var(--fintech-primary), #113a63); color: white; padding: 30px 20px 50px; text-align: center; border-bottom-left-radius: 24px; border-bottom-right-radius: 24px; box-shadow: 0 4px 12px rgba(10, 37, 64, 0.15); }
    .card-box { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 500px; margin: -35px auto 30px; position: relative; border: 1px solid rgba(0,0,0,0.05); }
    .form-control, .form-select { border-radius: 10px; border: 1px solid #E2E8F0; background-color: #F8FAFC; padding: 10px 15px; }
    .form-control:focus, .form-select:focus { background-color: #FFFFFF; border-color: var(--fintech-accent); box-shadow: 0 0 0 4px rgba(99, 91, 255, 0.1); }
    .btn-fintech { background-color: var(--fintech-primary); color: white; border-radius: 10px; padding: 12px; font-weight: 500; border: none; transition: 0.3s; }
    .btn-fintech:hover { background-color: #06182c; color: white; transform: translateY(-1px); box-shadow: 0 4px 10px rgba(10,37,64,0.2); }
    #systemLoading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.95); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    
    .modern-back-btn { font-size: 0.9rem; font-weight: 500; transition: all 0.2s ease; cursor: pointer; color: #64748B; margin-bottom: 20px; }
    .modern-back-btn:hover { color: var(--fintech-primary); transform: translateX(-4px); }
    .back-icon { background: #F1F5F9; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 8px; color: #64748B; transition: 0.2s; }
    .wealth-card { background: linear-gradient(135deg, #10B981, #059669); border-radius: 14px; padding: 20px; color: white; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 8px 20px rgba(16, 185, 129, 0.25); margin-bottom: 15px; }
    .wealth-icon { background: rgba(255,255,255,0.2); width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; backdrop-filter: blur(4px); }
    .debt-alert { background: #FEF2F2; border-left: 4px solid #EF4444; border-radius: 8px; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(239, 68, 68, 0.08); transition: 0.3s; }
    .debt-label { font-size: 0.75rem; color: #7F1D1D; font-weight: 600; }
    .debt-value { font-size: 0.85rem; font-weight: 700; background: #EF4444; color: white; padding: 4px 12px; border-radius: 20px; box-shadow: 0 3px 10px rgba(239, 68, 68, 0.3); }
  </style>
</head>
<body>

<div id="systemLoading"><div class="spinner-border mb-3" style="width: 3rem; height: 3rem; color: var(--fintech-accent);" role="status"></div><p class="text-muted fw-medium">กำลังเตรียมระบบและประมวลผลยอดเงิน...</p></div>

<div class="app-header">
  <h5 class="fw-bold mb-1">กองทุนสวัสดิการชุมชน</h5>
  <p class="opacity-75 small mb-0">ระบบทำรายการสมทบเงินออนไลน์</p>
</div>

<div class="container mb-5">
  <div class="card-box">
    <a href="https://liff.line.me/2010764982-RCKkyPZG" class="text-decoration-none d-inline-flex align-items-center modern-back-btn">
      <div class="back-icon"><i class="fa-solid fa-arrow-left"></i></div><span>กลับหน้าหลัก</span>
    </a>

    <h6 class="mb-4 text-center fw-bold" style="color: var(--fintech-primary);"><i class="fa-solid fa-wallet me-2 text-primary"></i>ฟอร์มแจ้งชำระเงินสมทบ</h6>
    
    <div class="wealth-card">
      <div><span class="d-block mb-1" style="font-size: 0.85rem; opacity: 0.9;">ยอดที่สมทบไปแล้วทั้งหมด</span><h3 class="fw-bold mb-0" id="paidAmount">0 บาท</h3></div>
      <div class="wealth-icon"><i class="fa-solid fa-money-bills"></i></div>
    </div>

    <div class="debt-alert" id="debtAlertBox">
      <div class="debt-label" id="debtLabelText"><i class="fa-solid fa-circle-exclamation me-1 text-danger"></i> ยอดค้างชำระ (ตั้งต้นปีละ)</div>
      <div id="maxAmountText" class="debt-value">กำลังคำนวณ...</div>
    </div>
    
    <form id="contribForm" onsubmit="handleContribSubmit(event)">
      <input type="hidden" id="uid" name="uid">
      <input type="hidden" id="fullName" name="fullName">

      <div class="mb-3"><label class="form-label small text-muted fw-medium">ชื่อ-นามสกุลสมาชิก</label><input type="text" class="form-control bg-light text-muted border-0" id="displayFullName" readonly></div>
      <div class="mb-3">
        <label class="form-label small text-muted fw-medium">จำนวนเงินที่ต้องการสมทบ</label>
        <div class="input-group">
          <input type="number" class="form-control fw-bold text-primary" id="amount" name="amount" min="1" placeholder="ระบุจำนวนเงิน" required oninput="validateAmount(this)">
          <span class="input-group-text bg-white text-muted border-start-0">บาท</span>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label small text-muted fw-medium">ช่องทางการชำระเงิน</label>
        <select class="form-select fw-medium text-dark" id="paymentMethod" name="paymentMethod" required onchange="toggleSlipSection()">
          <option value="" disabled selected>-- เลือกช่องทางชำระเงิน --</option><option value="โอนเงินผ่านธนาคาร">โอนเงินผ่านธนาคาร (แนบสลิป)</option><option value="ชำระผ่านคณะกรรมการ">ชำระเงินสดผ่านคณะกรรมการศูนย์</option>
        </select>
      </div>

      <div class="mb-4 p-3 rounded-3 border border-primary border-opacity-10" id="slipSection" style="display: none; background: #F8FAFC;">
        <label class="form-label small fw-bold text-dark"><i class="fa-solid fa-receipt me-1 text-primary"></i>แนบหลักฐานการโอนเงิน (สลิป)</label>
        <input type="file" class="form-control form-control-sm mb-1" id="slipFile" accept="image/*" onchange="convertImageToBase64(this)">
        <input type="hidden" id="slipBase64" name="slipBase64">
        <input type="hidden" id="slipFileName" name="slipFileName">
        <div class="form-text" style="font-size: 0.75rem; color: #94A3B8;">รองรับไฟล์รูปภาพ (JPG, PNG) ขนาดไม่เกิน 5MB</div>
      </div>
      <button type="submit" class="btn btn-fintech w-100 shadow-sm" id="submitBtn">ยืนยันการทำรายการสมทบ</button>
    </form>
  </div>
</div>

<script>
  const LIFF_ID = "2010764982-BltKP85l"; 
  const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzh4Pwae129CGg2IS0V-nL3rPh9CMTIgDYCVTmSgalGKyzASmSWraqz0PHt8G9j6saV/exec"; 
  let currentMaxAllowed = 365; // ค่ามาตรฐาน (Fault-Tolerant Default)

  document.addEventListener("DOMContentLoaded", async () => {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (liff.isLoggedIn()) {
        const profile = await liff.getProfile();
        document.getElementById('uid').value = profile.userId;
        const result = await fetch(GAS_API_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "checkStatus", uid: profile.userId }) }).then(r=>r.json());
        document.getElementById('systemLoading').style.display = 'none';

        if (result.status === 'registered') {
          const data = result.memberData;
          document.getElementById('fullName').value = data.fullName;
          document.getElementById('displayFullName').value = data.fullName;
          document.getElementById('paidAmount').innerText = (data.totalContribution || 0) + ' บาท';
          
          currentMaxAllowed = data.outstandingBalance !== undefined ? data.outstandingBalance : 365;
          document.getElementById('amount').max = currentMaxAllowed;
          
          if (currentMaxAllowed <= 0) {
            const alertBox = document.getElementById('debtAlertBox');
            alertBox.style.background = '#F0FDF4'; alertBox.style.borderLeftColor = '#10B981';
            document.getElementById('debtLabelText').innerHTML = `<i class="fa-solid fa-circle-check me-1 text-success"></i> สถานะยอดค้างชำระ`;
            document.getElementById('debtLabelText').style.color = '#14532D';
            document.getElementById('maxAmountText').innerHTML = `ไม่มียอดค้าง`;
            document.getElementById('maxAmountText').className = 'badge bg-success rounded-pill px-3 py-2 fw-bold shadow-sm';
            document.getElementById('amount').disabled = true; document.getElementById('paymentMethod').disabled = true; document.getElementById('submitBtn').disabled = true;
            Swal.fire('ยอดเยี่ยม', 'คุณส่งเงินสมทบครบถ้วนแล้ว ไม่มียอดค้างชำระ', 'info');
          } else { document.getElementById('maxAmountText').innerHTML = `${currentMaxAllowed} บาท`; }
        } else Swal.fire('แจ้งเตือน', 'กรุณาลงทะเบียนก่อน', 'warning').then(() => window.location.href = 'https://liff.line.me/2010764982-RCKkyPZG');
      } else liff.login();
    } catch (err) { document.getElementById('systemLoading').innerHTML = `<div class="text-danger text-center"><h6>Error</h6><p class="small">${err.message}</p></div>`; }
  });

  function validateAmount(input) {
    if (input.value > currentMaxAllowed) {
      input.value = currentMaxAllowed;
      Swal.fire({ toast: true, position: 'top', icon: 'warning', title: `ระบุได้สูงสุดไม่เกิน (${currentMaxAllowed} บาท)`, showConfirmButton: false, timer: 2500 });
    }
  }

  function toggleSlipSection() {
    const method = document.getElementById('paymentMethod').value; const slipSection = document.getElementById('slipSection');
    if (method === 'โอนเงินผ่านธนาคาร') { slipSection.style.display = 'block'; document.getElementById('slipFile').required = true; } 
    else { slipSection.style.display = 'none'; document.getElementById('slipFile').required = false; document.getElementById('slipFile').value = ""; document.getElementById('slipBase64').value = ""; }
  }

  function convertImageToBase64(input) {
    const file = input.files[0];
    if (file) { document.getElementById('slipFileName').value = file.name; const reader = new FileReader(); reader.onload = function(e){ document.getElementById('slipBase64').value = e.target.result; }; reader.readAsDataURL(file); }
  }

  async function handleContribSubmit(event) {
    event.preventDefault(); const submitBtn = document.getElementById('submitBtn'); submitBtn.disabled = true; submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>กำลังทำรายการ...';
    try {
      const dataObject = Object.fromEntries(new FormData(event.target).entries()); dataObject.action = "handleContribution";
      const result = await fetch(GAS_API_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify(dataObject) }).then(r=>r.json());
      if (result.status === 'success') Swal.fire({ title: 'ทำรายการสำเร็จ', text: result.message, icon: 'success', confirmButtonColor: '#00D084' }).then(() => window.location.href = 'https://liff.line.me/2010764982-RCKkyPZG');
      else { Swal.fire({ title: 'แจ้งเตือน', text: result.message, icon: 'warning', confirmButtonColor: '#0A2540' }); submitBtn.disabled = false; submitBtn.innerText = "ยืนยันการทำรายการสมทบ"; }
    } catch (error) { Swal.fire({ title: 'ข้อผิดพลาด', text: 'เซิร์ฟเวอร์ไม่ตอบสนอง', icon: 'error', confirmButtonColor: '#0A2540' }); submitBtn.disabled = false; submitBtn.innerText = "ยืนยันการทำรายการสมทบ"; }
  }
</script>
</body>
</html>
